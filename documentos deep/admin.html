<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>VSSTRAEDER - Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #0a0f1a;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { color: #000; }
        .logout-btn {
            background: #000;
            color: #00ff88;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(0,255,136,0.2);
        }
        .stat-card h3 { color: #8899aa; font-size: 14px; margin-bottom: 10px; }
        .stat-card .value { color: #00ff88; font-size: 32px; font-weight: bold; }
        table {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            overflow: hidden;
        }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { background: rgba(0,255,136,0.1); color: #00ff88; }
        .status-active { color: #00ff88; }
        .status-expired { color: #ff3060; }
        .status-trial { color: #f59e0b; }
        .btn { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; margin: 2px; }
        .btn-extend { background: #00ff88; color: #000; }
        .btn-block { background: #ff3060; color: #fff; }
        .btn-confirm { background: #3b82f6; color: #fff; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1a1f2e;
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0a0f1a;
            border: 1px solid rgba(0,255,136,0.2);
            border-radius: 8px;
            color: #fff;
        }
        .search-box {
            margin-bottom: 20px;
            padding: 12px;
            width: 300px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,255,136,0.2);
            border-radius: 8px;
            color: #fff;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>👑 VSSTRAEDER - ADMIN</h1>
        <button class="logout-btn" onclick="logout()">Sair</button>
    </div>
    
    <div class="stats-grid" id="statsGrid"></div>
    
    <input type="text" class="search-box" id="searchBox" placeholder="🔍 Buscar usuário por nome ou email..." onkeyup="filterUsers()">
    
    <table id="usersTable">
        <thead>
            <tr><th>Nome</th><th>Email</th><th>Telefone</th><th>Status</th><th>Expira Trial</th><th>Expira Assinatura</th><th>Ações</th></tr>
        </thead>
        <tbody id="usersBody"></tbody>
    </table>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Estender Acesso</h3>
        <input type="number" id="extendDays" placeholder="Dias a adicionar">
        <select id="planType">
            <option value="monthly">Mensal (30 dias)</option>
            <option value="annual">Anual (365 dias)</option>
        </select>
        <button class="btn btn-extend" onclick="confirmExtend()">Confirmar</button>
        <button class="btn" onclick="closeModal()">Cancelar</button>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:3001';
    let currentUserId = null;
    let allUsers = [];
    
    async function loadUsers() {
        const token = localStorage.getItem('vsstraeder_token');
        if (!token) { window.location.href = 'login.html'; return; }
        
        const response = await fetch(`${API_URL}/api/admin/users`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (response.status === 403) {
            alert('Acesso negado. Você não é administrador.');
            window.location.href = 'index.html';
            return;
        }
        
        const data = await response.json();
        allUsers = data.users || [];
        renderUsers(allUsers);
        updateStats(allUsers);
    }
    
    function renderUsers(users) {
        const tbody = document.getElementById('usersBody');
        tbody.innerHTML = '';
        
        users.forEach(user => {
            const now = new Date();
            const trialEnd = new Date(user.trial_end);
            const subEnd = user.subscription_end ? new Date(user.subscription_end) : null;
            
            let status = '';
            let statusClass = '';
            if (subEnd && subEnd >= now) {
                status = '✅ ATIVO';
                statusClass = 'status-active';
            } else if (trialEnd >= now) {
                const daysLeft = Math.ceil((trialEnd - now) / (1000*60*60*24));
                status = `🎁 TRIAL (${daysLeft} dias)`;
                statusClass = 'status-trial';
            } else {
                status = '❌ EXPIRADO';
                statusClass = 'status-expired';
            }
            
            const row = tbody.insertRow();
            row.innerHTML = `
                <td>${user.name}</td>
                <td>${user.email}</td>
                <td>${user.phone || '-'}</td>
                <td class="${statusClass}">${status}</td>
                <td>${new Date(user.trial_end).toLocaleDateString('pt-BR')}</td>
                <td>${user.subscription_end ? new Date(user.subscription_end).toLocaleDateString('pt-BR') : '-'}</td>
                <td>
                    <button class="btn btn-extend" onclick="openExtendModal('${user.id}')">➕ Extender</button>
                    <button class="btn btn-block" onclick="blockUser('${user.id}')">🔒 Bloquear</button>
                    <button class="btn btn-confirm" onclick="confirmPayment('${user.id}')">💰 Pagamento</button>
                </td>
            `;
        });
    }
    
    function filterUsers() {
        const search = document.getElementById('searchBox').value.toLowerCase();
        const filtered = allUsers.filter(u => 
            u.name.toLowerCase().includes(search) || 
            u.email.toLowerCase().includes(search)
        );
        renderUsers(filtered);
    }
    
    function updateStats(users) {
        const now = new Date();
        const active = users.filter(u => u.subscription_end && new Date(u.subscription_end) >= now).length;
        const trial = users.filter(u => !u.subscription_end && new Date(u.trial_end) >= now).length;
        const expired = users.filter(u => {
            const trialEnd = new Date(u.trial_end);
            const subEnd = u.subscription_end ? new Date(u.subscription_end) : null;
            return (trialEnd < now && (!subEnd || subEnd < now));
        }).length;
        const total = users.length;
        
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><h3>Total Usuários</h3><div class="value">${total}</div></div>
            <div class="stat-card"><h3>✅ Ativos (Pagos)</h3><div class="value">${active}</div></div>
            <div class="stat-card"><h3>🎁 Em Trial</h3><div class="value">${trial}</div></div>
            <div class="stat-card"><h3>❌ Expirados</h3><div class="value">${expired}</div></div>
        `;
    }
    
    function openExtendModal(userId) {
        currentUserId = userId;
        document.getElementById('modalTitle').innerText = 'Estender Acesso';
        document.getElementById('extendDays').value = 30;
        document.getElementById('modal').classList.add('active');
    }
    
    async function confirmExtend() {
        const days = document.getElementById('extendDays').value;
        const planType = document.getElementById('planType').value;
        const daysMap = { monthly: 30, annual: 365 };
        const finalDays = days || daysMap[planType] || 30;
        
        const token = localStorage.getItem('vsstraeder_token');
        await fetch(`${API_URL}/api/admin/extend-access`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ userId: currentUserId, days: finalDays })
        });
        
        closeModal();
        loadUsers();
    }
    
    async function confirmPayment(userId) {
        const token = localStorage.getItem('vsstraeder_token');
        const transactionId = prompt('Digite o código da transação PIX do usuário:');
        if (!transactionId) return;
        
        const response = await fetch(`${API_URL}/api/admin/confirm-payment`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ transactionId, userId })
        });
        
        const data = await response.json();
        if (data.success) {
            alert('Pagamento confirmado! Acesso liberado.');
            loadUsers();
        } else {
            alert(data.error || 'Erro ao confirmar pagamento');
        }
    }
    
    async function blockUser(userId) {
        if (!confirm('Bloquear este usuário?')) return;
        const token = localStorage.getItem('vsstraeder_token');
        await fetch(`${API_URL}/api/admin/block-user`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ userId, days: 30 })
        });
        loadUsers();
    }
    
    function closeModal() {
        document.getElementById('modal').classList.remove('active');
        currentUserId = null;
    }
    
    async function logout() {
        await fetch(`${API_URL}/api/logout`, { method: 'POST' });
        localStorage.removeItem('vsstraeder_token');
        window.location.href = 'login.html';
    }
    
    loadUsers();
</script>
</body>
</html>
