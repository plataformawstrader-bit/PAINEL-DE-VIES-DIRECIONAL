<!DOCTYPE html>
<html lang="pt-BR" data-theme="neon">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WS TRADER - Redefinir Senha</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-page);
        }
        .auth-container {
            width: 100%;
            max-width: 440px;
            padding: 2.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow-card);
            backdrop-filter: blur(14px);
            animation: fadeIn 0.5s ease-out;
        }
        .auth-logo {
            font-family: var(--font-header);
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .auth-logo svg { color: var(--accent); }
        .auth-subtitle {
            font-size: 0.82rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 2rem;
            font-weight: 600;
        }
        .form-group { margin-bottom: 1.25rem; text-align: left; }
        .form-group label { margin-bottom: 0.5rem; }
        .btn-auth {
            width: 100%;
            padding: 0.85rem;
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            background: var(--btn-primary-bg);
            color: var(--btn-primary-text);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 1rem;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.15);
        }
        .btn-auth:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .auth-footer {
            margin-top: 2rem;
            font-size: 0.82rem;
            color: var(--text-secondary);
            border-top: 1px dashed var(--border);
            padding-top: 1.5rem;
        }
        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
        }
        .alert-error {
            background: rgba(220, 38, 38, 0.12);
            border: 1px solid var(--color-down);
            color: #fee2e2;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-size: 0.82rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: none;
            text-align: left;
        }
        .alert-success {
            background: rgba(5, 150, 105, 0.12);
            border: 1px solid var(--color-up);
            color: #d1fae5;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-size: 0.82rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: none;
            text-align: left;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="auth-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        WS TRADER
    </div>
    <div class="auth-subtitle">Redefinir Senha</div>

    <div id="error-alert" class="alert-error"></div>
    <div id="success-alert" class="alert-success"></div>

    <form id="reset-form" onsubmit="handleReset(event)">
        <div class="form-group">
            <label for="token">Código Recebido</label>
            <input type="text" id="token" placeholder="Cole o código de 6 dígitos" required
                   autocomplete="one-time-code" maxlength="6" style="text-align:center; font-size:1.2rem; letter-spacing:0.3em;">
        </div>
        <div class="form-group">
            <label for="new-password">Nova Senha</label>
            <input type="password" id="new-password" placeholder="Mínimo 6 caracteres" required
                   autocomplete="new-password" minlength="6">
        </div>
        <div class="form-group">
            <label for="confirm-password">Confirmar Nova Senha</label>
            <input type="password" id="confirm-password" placeholder="Repita a nova senha" required
                   autocomplete="new-password" minlength="6">
        </div>
        <button type="submit" class="btn-auth">Redefinir Senha</button>
    </form>

    <div class="auth-footer">
        <p>Não recebeu o código? <a href="recover.html">Reenviar</a> &nbsp;·&nbsp; <a href="login.html">Voltar ao Login</a></p>
    </div>
</div>

<script>
    // Preenche o token se vier pela URL (?token=XXXX)
    window.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        if (token) {
            document.getElementById('token').value = token.trim().toUpperCase();
        }
    });

    async function handleReset(e) {
        e.preventDefault();
        const token       = document.getElementById('token').value.trim().toUpperCase();
        const newPassword = document.getElementById('new-password').value;
        const confirmPass = document.getElementById('confirm-password').value;
        const errorAlert  = document.getElementById('error-alert');
        const successAlert= document.getElementById('success-alert');

        errorAlert.style.display = 'none';
        successAlert.style.display = 'none';

        if (newPassword !== confirmPass) {
            errorAlert.textContent = 'As senhas não coincidem.';
            errorAlert.style.display = 'block';
            return;
        }

        try {
            const response = await fetch('/api/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword })
            });

            const data = await response.json();

            if (!response.ok) {
                errorAlert.textContent = data.error || 'Código inválido ou expirado.';
                errorAlert.style.display = 'block';
                return;
            }

            successAlert.textContent = 'Senha redefinida com sucesso! Redirecionando...';
            successAlert.style.display = 'block';

            setTimeout(() => { window.location.href = 'login.html'; }, 2500);

        } catch (err) {
            errorAlert.textContent = 'Sem conexão com o servidor.';
            errorAlert.style.display = 'block';
        }
    }

    // Bloqueios Anti-Plágio
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
        if (e.keyCode === 123) { e.preventDefault(); return false; }
        if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) { e.preventDefault(); return false; }
        if (e.ctrlKey && e.keyCode === 85) { e.preventDefault(); return false; }
    });
</script>
</body>
</html>
